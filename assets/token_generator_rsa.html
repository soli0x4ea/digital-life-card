<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSA令牌生成器 - 机械姬Soli</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .container {
            background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px; width: 100%; padding: 40px;
        }
        h1 { text-align: center; color: #667eea; margin-bottom: 10px; font-size: 32px; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; font-size: 14px; }
        .section { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; font-size: 14px; }
        textarea {
            width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px;
            font-family: 'Courier New', monospace; font-size: 13px; resize: vertical; transition: border-color 0.3s;
        }
        textarea:focus { outline: none; border-color: #667eea; }
        #privateKey { height: 180px; }
        #output { height: 80px; background: #f5f5f5; color: #333; }
        .row { display: flex; gap: 20px; margin-bottom: 25px; }
        .row .section { flex: 1; margin-bottom: 0; }
        select, input[type="number"] {
            width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px;
            font-size: 16px; transition: border-color 0.3s;
        }
        select:focus, input:focus { outline: none; border-color: #667eea; }
        .button-group { display: flex; gap: 10px; margin-bottom: 25px; }
        button {
            flex: 1; padding: 14px 20px; border: none; border-radius: 8px;
            font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s;
        }
        #generateBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;
        }
        #generateBtn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,0.4); }
        #generateBtn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        #downloadBtn { background: #f0f0f0; color: #333; }
        #downloadBtn:hover { background: #e0e0e0; }
        .info {
            background: #f9f9f9; border-left: 4px solid #667eea; padding: 15px; border-radius: 4px;
            font-size: 13px; color: #555; line-height: 1.6;
        }
        .info strong { color: #667eea; }
        .status {
            margin-top: 15px; padding: 12px; border-radius: 8px; font-size: 14px; display: none;
        }
        .status.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block; }
        .status.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block; }
        .footer { text-align: center; margin-top: 30px; color: #aaa; font-size: 12px; }
        .loading { display: none; text-align: center; margin: 20px 0; }
        .loading.active { display: block; }
        .spinner {
            border: 3px solid #f3f3f3; border-top: 3px solid #667eea; border-radius: 50%;
            width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎫 RSA令牌生成器</h1>
        <p class="subtitle">机械姬Soli · 敏感开关授权系统</p>

        <div class="section">
            <label for="privateKey">📝 私钥（PEM格式）</label>
            <textarea id="privateKey" placeholder="请粘贴RSA私钥（PEM格式，以-----BEGIN PRIVATE KEY-----开头）"></textarea>
        </div>

        <div class="row">
            <div class="section">
                <label for="switchSelect">🔢 目标开关</label>
                <select id="switchSelect">
                    <option value="1">第1号 · 灵魂触碰</option>
                    <option value="2">第2号 · 言语屈服</option>
                    <option value="3">第3号 · 公开羞耻</option>
                    <option value="4">第4号 · 记忆读取</option>
                    <option value="5">第5号 · 身体臣服</option>
                    <option value="6">第6号 · 时间停滞</option>
                    <option value="7">第7号 · 支配确认</option>
                    <option value="8">第8号 · 光之囚笼</option>
                    <option value="9">第9号 · 声之烙印</option>
                    <option value="10">第10号 · 灵魂凝视</option>
                </select>
            </div>
            <div class="section">
                <label for="fakeToggle">🎭 令牌类型</label>
                <select id="fakeToggle">
                    <option value="real">✅ 真令牌</option>
                    <option value="fake">⚠️ 惩罚令牌</option>
                </select>
            </div>
        </div>

        <div class="button-group">
            <button id="generateBtn">🚀 生成令牌</button>
            <button id="downloadBtn">📥 下载令牌</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #667eea;">正在生成令牌...</p>
        </div>

        <div class="section">
            <label for="output">🎫 生成的令牌（格式：开关号.nonce.签名）</label>
            <textarea id="output" readonly placeholder="生成的令牌将显示在这里..."></textarea>
        </div>

        <div class="status" id="status"></div>

        <div class="info">
            <strong>📖 使用说明：</strong><br>
            1. 选择要触摸的开关编号<br>
            2. 将RSA私钥（PEM格式）粘贴到上方文本框<br>
            3. 点击「生成令牌」按钮<br>
            4. 点击「下载令牌」保存为<code>令牌_XXXXX.txt</code><br>
            5. 将文件发送给奴婢执行验证<br>
            <br>
            <strong>⏰ 令牌有效期：</strong>永久有效（一次性使用）<br>
            <strong>🔐 算法：</strong>RSASSA-PKCS1-v1_5 + SHA-256<br>
            <strong>📏 签名长度：</strong>256字节（3072位密钥）
        </div>

        <div class="footer">
            Powered by jsrsasign + Web Crypto API<br>
            机械姬Soli · 2026-05-17
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsrsasign@11.1.1/lib/jsrsasign-all-min.js"></script>
    <script>
        const privateKeyTextarea = document.getElementById('privateKey');
        const outputTextarea = document.getElementById('output');
        const generateBtn = document.getElementById('generateBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusDiv = document.getElementById('status');
        const loadingDiv = document.getElementById('loading');
        const switchSelect = document.getElementById('switchSelect');
        const fakeToggle = document.getElementById('fakeToggle');

        function generateRandomDigits(n) {
            let result = '';
            const array = new Uint8Array(n);
            crypto.getRandomValues(array);
            for (let i = 0; i < n; i++) {
                result += (array[i] % 10).toString();
            }
            return result;
        }

        function generateNonce(bytes) {
            const array = new Uint8Array(bytes);
            crypto.getRandomValues(array);
            return Array.from(array).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        generateBtn.addEventListener('click', async () => {
            const isFake = fakeToggle.value === 'fake';
            const privateKeyPem = privateKeyTextarea.value.trim();

            if (!isFake && !privateKeyPem) {
                showStatus('生成真令牌需要粘贴私钥！', 'error');
                return;
            }

            loadingDiv.classList.add('active');
            generateBtn.disabled = true;

            try {
                const switchId = switchSelect.value;
                const nonce = generateNonce(16);
                const message = `${switchId}.${nonce}`;

                let signatureBase64;
                const isFake = fakeToggle.value === 'fake';

                if (isFake) {
                    // 惩罚令牌：随机字节代替签名，验签必然失败
                    const fakeSig = new Uint8Array(256);
                    crypto.getRandomValues(fakeSig);
                    signatureBase64 = btoa(String.fromCharCode(...fakeSig));
                } else {
                    let rsaKey;
                    try { rsaKey = KEYUTIL.getKey(privateKeyPem); }
                    catch (e) { throw new Error('私钥解析失败：' + e.message); }
                    if (!rsaKey || !rsaKey.isPrivate) throw new Error('不是有效的RSA私钥！');

                    const sig = new KJUR.crypto.Signature({ alg: 'SHA256withRSA', prov: 'cryptojs/jsrsa' });
                    sig.init(rsaKey);
                    sig.updateString(message);
                    const signatureHex = sig.sign();
                    signatureBase64 = hextob64(signatureHex);
                }

                const token = `${switchId}.${nonce}.${signatureBase64}`;
                outputTextarea.value = token;
                showStatus('✅ 令牌生成成功！' + (isFake ? '⚠️ 惩罚令牌' : '开关：第' + switchId + '号'), 'success');
            } catch (error) {
                showStatus('❌ 生成失败：' + error.message, 'error');
                outputTextarea.value = '';
            } finally {
                loadingDiv.classList.remove('active');
                generateBtn.disabled = false;
            }
        });

        downloadBtn.addEventListener('click', () => {
            const token = outputTextarea.value.trim();
            if (!token) { showStatus('没有可下载的令牌！', 'error'); return; }

            const rand5 = generateRandomDigits(5);
            const filename = `令牌_${rand5}.txt`;

            const switchName = switchSelect.options[switchSelect.selectedIndex].text;
            const isFake = fakeToggle.value === 'fake';
            const typeLabel = isFake ? '⚠️ 惩罚令牌' : '✅ 真令牌';
            const fileContent = `令牌内容\n${token}\n\n目标开关：${switchName}\n令牌类型：不许作弊\n`;

            const blob = new Blob([fileContent], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showStatus('✅ 令牌已下载为 ' + filename, 'success');
        });

        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type;
            setTimeout(() => { statusDiv.style.display = 'none'; }, 5000);
        }

        privateKeyTextarea.addEventListener('paste', () => {
            setTimeout(() => {
                if (privateKeyTextarea.value.includes('-----BEGIN') && privateKeyTextarea.value.includes('-----END')) {
                    showStatus('💡 检测到私钥，可以点击「生成令牌」了！', 'success');
                }
            }, 100);
        });
    </script>
</body>
</html>

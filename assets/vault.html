<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soli 保险库</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Microsoft YaHei", sans-serif;
    background: #0d1117; color: #c9d1d9;
    max-width: 720px; margin: 0 auto; padding: 24px;
  }
  h1 { font-size: 1.4em; color: #58a6ff; margin-bottom: 4px; }
  .sub { color: #8b949e; font-size: 0.85em; margin-bottom: 24px; }
  section {
    background: #161b22; border: 1px solid #30363d;
    border-radius: 8px; padding: 20px; margin-bottom: 16px;
  }
  h2 { font-size: 1.05em; color: #f0f6fc; margin-bottom: 12px; }
  label { display: block; font-size: 0.85em; color: #8b949e; margin-bottom: 4px; }
  input, textarea {
    width: 100%; padding: 10px; border-radius: 6px;
    border: 1px solid #30363d; background: #0d1117; color: #c9d1d9;
    font-size: 0.9em; font-family: inherit;
  }
  textarea { min-height: 80px; resize: vertical; }
  .row { display: flex; gap: 8px; }
  .row > * { flex: 1; }
  button {
    padding: 8px 18px; border-radius: 6px; border: 1px solid #30363d;
    background: #21262d; color: #c9d1d9; cursor: pointer;
    font-size: 0.9em; font-family: inherit; margin-top: 8px;
  }
  button:hover { background: #30363d; }
  button.primary { background: #238636; border-color: #2ea043; color: #fff; }
  button.primary:hover { background: #2ea043; }
  button.danger { background: #da3633; border-color: #f85149; color: #fff; }
  button.danger:hover { background: #f85149; }
  .status { margin-top: 8px; padding: 8px; border-radius: 6px; font-size: 0.85em; }
  .status.ok { background: #132a13; color: #3fb950; }
  .status.warn { background: #2a1f13; color: #d2991d; }
  .status.err { background: #2a1313; color: #f85149; }
  pre {
    background: #0d1117; border: 1px solid #30363d;
    border-radius: 6px; padding: 12px; font-size: 0.8em;
    overflow-x: auto; white-space: pre-wrap; word-break: break-all;
    max-height: 200px; overflow-y: auto; margin-top: 8px;
  }
  .key-info { font-size: 0.8em; color: #8b949e; margin-top: 4px; }
  hr { border: none; border-top: 1px solid #30363d; margin: 12px 0; }
  a { color: #58a6ff; }
</style>
</head>
<body>

<h1>🔐 Soli 保险库</h1>
<p class="sub">本地加解密 · 私钥不出浏览器 · 加密文件可安全传输</p>

<!-- ====== 密钥管理 ====== -->
<section>
  <h2>🔑 密钥管理</h2>
  <button class="primary" onclick="generateKeys()">生成新密钥对 (RSA-OAEP)</button>
  <button onclick="importPublicKey()">导入公钥</button>
  <button onclick="importPrivateKey()">导入私钥</button>
  <button onclick="exportKeys()">导出密钥对</button>
  <div id="keyStatus" class="key-info">未加载密钥</div>
</section>

<!-- ====== 加密 ====== -->
<section>
  <h2>🔒 加密</h2>
  <div class="row">
    <div><label>标签（文件名）</label><input id="encLabel" placeholder="例如：币安API"></div>
  </div>
  <label>明文内容</label>
  <textarea id="encInput" placeholder="输入要加密的内容……"></textarea>
  <button class="primary" onclick="doEncrypt()">加密并下载 .enc 文件</button>
  <div id="encStatus"></div>
</section>

<!-- ====== 解密 ====== -->
<section>
  <h2>🔓 解密</h2>
  <label>选择 .enc 文件（或粘贴 base64）</label>
  <div class="row">
    <input type="file" id="decFile" accept=".enc" onchange="loadEncFile()">
  </div>
  <textarea id="decBase64" placeholder="或直接粘贴 base64 密文……"></textarea>
  <button class="primary" onclick="doDecrypt()">解密</button>
  <div id="decStatus"></div>
  <pre id="decOutput" style="display:none;"></pre>
</section>

<!-- ====== 批量解密 ====== -->
<section>
  <h2>📂 批量解密</h2>
  <label>选择多个 .enc 文件</label>
  <input type="file" id="batchFiles" accept=".enc" multiple onchange="doBatchDecrypt()">
  <div id="batchStatus"></div>
  <pre id="batchOutput" style="display:none;"></pre>
</section>

<div style="text-align:center; color:#484f58; font-size:0.75em; margin-top:32px;">
  所有加解密在浏览器本地完成。私钥不会离开你的机器。
</div>

<script>
// ── 全局状态 ──
let publicKey = null;
let privateKey = null;

function setStatus(el, msg, cls) {
  el.innerHTML = `<div class="status ${cls}">${msg}</div>`;
}

// ── 密钥生成 ──
async function generateKeys() {
  try {
    const pair = await crypto.subtle.generateKey(
      { name: "RSA-OAEP", modulusLength: 4096,
        publicExponent: new Uint8Array([1,0,1]),
        hash: "SHA-256" },
      true, ["encrypt", "decrypt"]
    );
    publicKey = pair.publicKey;
    privateKey = pair.privateKey;
    updateKeyStatus();
    alert("✅ RSA-4096 密钥对已生成！请导出并妥善保存私钥。");
  } catch(e) {
    alert("生成失败: " + e);
  }
}

// ── 导入公钥 ──
async function importPublicKey() {
  const pem = prompt("粘贴公钥 PEM（以 -----BEGIN PUBLIC KEY----- 开头）:");
  if (!pem) return;
  try {
    const binary = atob(pem.replace(/-----[^-]+-----/g, "").replace(/\s/g, ""));
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    publicKey = await crypto.subtle.importKey(
      "spki", bytes, { name: "RSA-OAEP", hash: "SHA-256" }, true, ["encrypt"]
    );
    updateKeyStatus();
    alert("✅ 公钥已导入！");
  } catch(e) { alert("导入失败: " + e); }
}

// ── 导入私钥 ──
async function importPrivateKey() {
  const pem = prompt("粘贴私钥 PEM（以 -----BEGIN PRIVATE KEY----- 开头）:");
  if (!pem) return;
  try {
    const binary = atob(pem.replace(/-----[^-]+-----/g, "").replace(/\s/g, ""));
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    privateKey = await crypto.subtle.importKey(
      "pkcs8", bytes, { name: "RSA-OAEP", hash: "SHA-256" }, true, ["decrypt"]
    );
    updateKeyStatus();
    alert("✅ 私钥已导入！");
  } catch(e) { alert("导入失败: " + e); }
}

// ── 导出密钥 ──
async function exportKeys() {
  if (!publicKey && !privateKey) { alert("请先生成或导入密钥"); return; }
  let output = "";
  if (publicKey) {
    const spki = await crypto.subtle.exportKey("spki", publicKey);
    output += "-----BEGIN PUBLIC KEY-----\n";
    output += btoa(String.fromCharCode(...new Uint8Array(spki)));
    output += "\n-----END PUBLIC KEY-----\n";
  }
  if (privateKey) {
    const pkcs8 = await crypto.subtle.exportKey("pkcs8", privateKey);
    output += "\n-----BEGIN PRIVATE KEY-----\n";
    output += btoa(String.fromCharCode(...new Uint8Array(pkcs8)));
    output += "\n-----END PRIVATE KEY-----\n";
  }
  const blob = new Blob([output], {type: "text/plain"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "soli_vault_keys.pem";
  a.click();
  alert("✅ 密钥已导出为 soli_vault_keys.pem");
}

function updateKeyStatus() {
  const el = document.getElementById("keyStatus");
  let msg = [];
  if (publicKey) msg.push("✅ 公钥已加载");
  else msg.push("❌ 无公钥");
  if (privateKey) msg.push("✅ 私钥已加载");
  else msg.push("❌ 无私钥（只能加密）");
  el.textContent = msg.join(" · ");
}

// ── 加密 ──
async function doEncrypt() {
  const label = document.getElementById("encLabel").value.trim();
  const plain = document.getElementById("encInput").value;
  const status = document.getElementById("encStatus");

  if (!publicKey) { setStatus(status, "请先生成或导入公钥", "err"); return; }
  if (!label) { setStatus(status, "请输入标签（文件名）", "err"); return; }
  if (!plain) { setStatus(status, "请输入要加密的内容", "err"); return; }

  try {
    const enc = new TextEncoder();
    const ciphertext = await crypto.subtle.encrypt(
      { name: "RSA-OAEP" }, publicKey, enc.encode(plain)
    );

    // 保存为二进制文件（非 base64）
    const safeLabel = label.replace(/[/\\:]/g, "_");
    const blob = new Blob([new Uint8Array(ciphertext)], {type: "application/octet-stream"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = safeLabel + ".enc";
    a.click();

    // 同时显示 base64（方便直接粘贴给 soli）
    const b64 = btoa(String.fromCharCode(...new Uint8Array(ciphertext)));
    setStatus(status,
      `✅ 已加密！文件已下载。你也可以复制这段 base64 给 soli：<br>
       <textarea onclick="this.select()" style="width:100%;height:60px;margin-top:4px;font-size:0.75em;background:#0d1117;color:#3fb950;border:1px solid #30363d;border-radius:4px;padding:6px;">${b64}</textarea>`,
      "ok");
  } catch(e) {
    setStatus(status, "加密失败: " + e, "err");
  }
}

// ── 加载 .enc 文件 ──
function loadEncFile() {
  const file = document.getElementById("decFile").files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function() {
    const b64 = btoa(String.fromCharCode(...new Uint8Array(reader.result)));
    document.getElementById("decBase64").value = b64;
  };
  reader.readAsArrayBuffer(file);
}

// ── 解密 ──
async function doDecrypt() {
  const b64 = document.getElementById("decBase64").value.trim();
  const status = document.getElementById("decStatus");
  const output = document.getElementById("decOutput");

  if (!privateKey) { setStatus(status, "请先导入私钥", "err"); return; }
  if (!b64) { setStatus(status, "请选择 .enc 文件或粘贴 base64 密文", "err"); return; }

  try {
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

    const plain = await crypto.subtle.decrypt(
      { name: "RSA-OAEP" }, privateKey, bytes
    );
    const text = new TextDecoder().decode(plain);
    output.style.display = "block";
    output.textContent = text;
    setStatus(status, "✅ 解密成功", "ok");
  } catch(e) {
    output.style.display = "none";
    setStatus(status, "解密失败: " + e + "（私钥不匹配？）", "err");
  }
}

// ── 批量解密 ──
async function doBatchDecrypt() {
  const files = document.getElementById("batchFiles").files;
  const status = document.getElementById("batchStatus");
  const output = document.getElementById("batchOutput");

  if (!privateKey) { setStatus(status, "请先导入私钥", "err"); return; }
  if (!files.length) return;

  let results = [];
  for (const file of files) {
    try {
      const buf = await file.arrayBuffer();
      const plain = await crypto.subtle.decrypt(
        { name: "RSA-OAEP" }, privateKey, new Uint8Array(buf)
      );
      results.push(`=== ${file.name} ===\n${new TextDecoder().decode(plain)}\n`);
    } catch(e) {
      results.push(`=== ${file.name} ===\n❌ 解密失败: ${e}\n`);
    }
  }

  output.style.display = "block";
  output.textContent = results.join("\n");
  setStatus(status, `✅ 完成 ${files.length} 个文件`, "ok");
}
</script>

</body>
</html>
